x-shared-db-env: &shared-db-env
  DB_URL: jdbc:mysql://mysql:3306/agentscustomerstickets_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
  DB_USERNAME: agentscustomerstickets
  DB_PASSWORD: agentscustomerstickets123

x-shared-integration-env: &shared-integration-env
  USERS_INTEGRATION_INTERNAL_API_KEY: ${USERS_INTEGRATION_INTERNAL_API_KEY:-internal-users-key}

x-shared-runtime-env: &shared-runtime-env
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}

x-shared-app-env: &shared-app-env
  <<: [*shared-db-env, *shared-integration-env, *shared-runtime-env]
  USERS_INTEGRATION_MODE: ${USERS_INTEGRATION_MODE:-embedded}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
  # LOGGING_LEVEL_ROOT: DEBUG
  # LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [${APP_INSTANCE:-unknown}] ${PID:- } --- [%t] %logger{39} : %m%n%wEx"

x-shared-app-base: &shared-app-base
  image: agents-customers-tickets:local
  depends_on:
    mysql:
      condition: service_healthy
  environment:
    <<: *shared-app-env

services:
  mysql:
    image: mysql:8.4
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --binlog-expire-logs-seconds=86400
    environment:
      MYSQL_DATABASE: agentscustomerstickets_db
      MYSQL_USER: agentscustomerstickets
      MYSQL_PASSWORD: agentscustomerstickets123
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redpanda:
    profiles: ["cdc"]
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "19092:19092"
      - "18082:18082"
      - "19644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  redpanda-console:
    profiles: ["cdc"]
    image: docker.redpanda.com/redpandadata/console:v2.8.4
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
    ports:
      - "8089:8080"

  debezium:
    profiles: ["cdc"]
    image: quay.io/debezium/server:3.1
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
    volumes:
      - ./config/debezium/application.properties:/debezium/config/application.properties:ro
      - debezium_data:/debezium/data

  app_lb_1:
    <<: *shared-app-base
    environment:
      <<: *shared-app-env
      APP_INSTANCE: lb_1

  app_lb_2:
    <<: *shared-app-base
    environment:
      <<: *shared-app-env
      APP_INSTANCE: lb_2

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app_lb_1
      - app_lb_2
    ports:
      - "${APP_PORT:-8080}:80"
    command:
      - /bin/sh
      - -lc
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        upstream app_upstream {
          server app_lb_1:8080;
          server app_lb_2:8080;
        }

        server {
          listen 80;

          location / {
            proxy_pass http://app_upstream;
            proxy_set_header Host $$host;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }
        }
        EOF
        nginx -g 'daemon off;'

  users-service:
    profiles: ["users-ms"]
    build:
      context: .
      dockerfile: Dockerfile
    image: agents-customers-tickets:local
    container_name: agents-customers-tickets-users
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: [*shared-db-env, *shared-integration-env, *shared-runtime-env]
      USERS_INTEGRATION_MODE: embedded
    ports:
      - "${USERS_SERVICE_PORT:-8081}:8080"

volumes:
  mysql_data: # Persist MySQL data between restarts.
  debezium_data: # Persist Debezium offsets between restarts.
  redpanda_data: # Persist Redpanda data between restarts.
