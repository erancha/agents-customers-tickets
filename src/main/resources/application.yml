server:
  port: 8080

spring:
  application:
    name: agents-customers-tickets

  # profiles:
  #   active: remote-cache

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/agentscustomerstickets_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:agentscustomerstickets}
    password: ${DB_PASSWORD:agentscustomerstickets123}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    open-in-view: false # Disable open-in-view to prevent lazy loading during REST serialization (best practice for REST APIs); This ensures hidden database queries won't occur during JSON serialization in your REST endpoints.
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

security:
  jwt:
    issuer: ${JWT_ISSUER:agents-customers-tickets}
    secret: ${JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me}
    accessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:60}

users:
  integration:
    mode: ${USERS_INTEGRATION_MODE:embedded}
    base-url: ${USERS_INTEGRATION_BASE_URL:http://localhost:8081}
    internal-api-key: ${USERS_INTEGRATION_INTERNAL_API_KEY:internal-users-key}

websocket:
  broker:
    relay:
      enabled: ${WS_BROKER_RELAY_ENABLED:false}
      host: ${WS_BROKER_RELAY_HOST:localhost}
      port: ${WS_BROKER_RELAY_PORT:61613}
      client-login: ${WS_BROKER_RELAY_CLIENT_LOGIN:guest}
      client-passcode: ${WS_BROKER_RELAY_CLIENT_PASSCODE:guest}
      system-login: ${WS_BROKER_RELAY_SYSTEM_LOGIN:guest}
      system-passcode: ${WS_BROKER_RELAY_SYSTEM_PASSCODE:guest}

management:
  endpoints:
    web:
      exposure:
        include: ""
