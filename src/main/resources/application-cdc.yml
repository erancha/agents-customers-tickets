spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: ${ADMIN_EVENTS_CDC_GROUP_ID:admin-events-cdc}
      auto-offset-reset: ${ADMIN_EVENTS_CDC_OFFSET_RESET:earliest}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        metadata.max.age.ms: ${ADMIN_EVENTS_CDC_METADATA_MAX_AGE_MS:10000} # For topic-pattern subscriptions, refresh metadata every 10s so newly created Debezium topics (for example ...tickets) are discovered quickly.

admin:
  events:
    kafka:
      topic-pattern: ${ADMIN_EVENTS_CDC_TOPIC_PATTERN:my.agentscustomerstickets_db.*}
